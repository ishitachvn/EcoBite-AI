<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EcoWise — AI-powered Food Waste Reduction and Donation Assistant supporting UN SDG 2 (Zero Hunger) and SDG 12 (Responsible Consumption).">
    <title>EcoWise 🌱 — Food Waste Reduction & Donation Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="floating-leaf leaf-1">🍃</div>
        <div class="floating-leaf leaf-2">🌿</div>
        <div class="floating-leaf leaf-3">🍀</div>
        <div class="floating-leaf leaf-4">🌱</div>
        <div class="floating-leaf leaf-5">🍃</div>
        <div class="floating-leaf leaf-6">🌿</div>
        <div class="floating-leaf leaf-7">🍀</div>
        <div class="floating-leaf leaf-8">🌱</div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo-wrapper">
                    <div class="logo-icon">🌱</div>
                    <div class="logo-text">
                        <h1>EcoWise</h1>
                        <span class="tagline">Zero Waste. Zero Hunger.</span>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-label">Quick Actions</div>
                <button class="nav-item active" data-action="new-chat" id="btn-new-chat">
                    <span class="nav-icon">💬</span>
                    <span class="nav-label">New Chat</span>
                </button>
                <button class="nav-item" data-action="donate" id="btn-donate">
                    <span class="nav-icon">🤝</span>
                    <span class="nav-label">Donation Check</span>
                </button>
                <button class="nav-item" data-action="storage" id="btn-storage">
                    <span class="nav-icon">🧊</span>
                    <span class="nav-label">Storage Guide</span>
                </button>
                <button class="nav-item" data-action="tips" id="btn-tips">
                    <span class="nav-icon">💡</span>
                    <span class="nav-label">Waste Reduction Tips</span>
                </button>
                <button class="nav-item" data-action="find-ngos" id="btn-find-ngos">
                    <span class="nav-icon">📍</span>
                    <span class="nav-label">Find Donation Centers</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="sdg-badges">
                    <div class="sdg-badge sdg-2" title="UN SDG 2: Zero Hunger">
                        <span class="sdg-number">2</span>
                        <span class="sdg-name">Zero Hunger</span>
                    </div>
                    <div class="sdg-badge sdg-12" title="UN SDG 12: Responsible Consumption">
                        <span class="sdg-number">12</span>
                        <span class="sdg-name">Responsible Consumption</span>
                    </div>
                </div>
                <button class="nav-item support-btn" data-action="support" id="btn-support">
                    <span class="nav-icon">📞</span>
                    <span class="nav-label">Contact Support</span>
                </button>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area">
            <!-- Chat Header -->
            <header id="chat-header" class="chat-header">
                <button id="btn-toggle-sidebar" class="btn-toggle-sidebar" aria-label="Toggle sidebar">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <div class="header-info">
                    <div class="header-avatar">
                        <span class="avatar-emoji">🌱</span>
                        <span class="status-dot"></span>
                    </div>
                    <div class="header-text">
                        <h2>EcoWise Assistant</h2>
                        <span class="header-status">Online • Ready to help</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="btn-clear-chat" class="header-btn" title="Clear chat" aria-label="Clear chat">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                    <button id="btn-theme-toggle" class="header-btn" title="Toggle theme" aria-label="Toggle theme">
                        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
            </header>

            <!-- Messages Container -->
            <div id="chat-messages" class="chat-messages">
                <!-- Messages will be inserted here -->
            </div>

            <!-- Typing Indicator -->
            <div id="typing-indicator" class="typing-indicator hidden">
                <div class="typing-avatar">🌱</div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <!-- Quick Reply Buttons (context-sensitive) -->
            <div id="quick-replies" class="quick-replies">
                <!-- Quick reply buttons inserted dynamically -->
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" class="user-input" placeholder="Type your message..." rows="1" aria-label="Type your message"></textarea>
                    <button id="btn-send" class="btn-send" aria-label="Send message" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
                <div class="input-footer">
                    <span>EcoWise supports <strong>UN SDG 2</strong> & <strong>SDG 12</strong> • Reducing food waste, one conversation at a time 🌍</span>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
